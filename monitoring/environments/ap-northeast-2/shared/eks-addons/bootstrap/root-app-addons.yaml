apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-app-addons
  namespace: argocd
spec:
  # Hub 자기 자신(cluster_name=monitoring-self)에만 매칭한다 — selector 없이 clusters: {}로
  # 두면 dev/prd spoke cluster Secret도 매칭돼 spoke마다 root-app-addons가 중복 생성되고,
  # 그 아래 addon ApplicationSet들을 서로 다른 부모가 동시에 소유하려 해서
  # SharedResourceWarning이 발생한다(6-5에서 addon selector 범위 문제로 이미 겪은 것과 동일
  # 클래스의 사고).
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster_name: monitoring-self
  template:
    metadata:
      name: root-app-addons
    spec:
      project: default
      source:
        # repoURL/path/revision을 하드코딩하지 않고 cluster Secret annotation에서 읽는다 —
        # Terraform 쪽 local.gitops_bridge_hub_cluster.metadata(gitops-bridge-irsa.tf)가
        # 실제 값을 소유한다. eks-addons/ 아래는 서브디렉토리 없이 파일이 바로 있어
        # directory.recurse 불필요.
        repoURL: '{{metadata.annotations.addons_repo_url}}'
        targetRevision: '{{metadata.annotations.addons_repo_revision}}'
        path: '{{metadata.annotations.addons_repo_basepath}}{{metadata.annotations.addons_repo_path}}'
      # destination은 in-cluster로 고정한다 — clusters generator가 매칭한
      # monitoring-self(IRSA 기반 등록)는 읽기 전용 RBAC(argocd-hub-read-all: get/list/watch만
      # 있음, Phase 6-1에서 의도적으로 least-privilege 검증용으로 구성)라 '{{server}}'를 그대로
      # destination에 쓰면 이 Application이 만드는 하위 addon ApplicationSet들의 write가 전부
      # 막혀 sync가 실패한다. devops-manifest의 실제 addon ApplicationSet
      # (aws-load-balancer-controller.yaml 등)도 동일한 이유로 monitoring 자신을 대상으로 할 때는
      # in-cluster를 고정하고, clusters generator는 순수하게 annotation 값을 읽어오는 용도로만
      # 쓴다 — 그 패턴을 그대로 따른다(2026-07-21, devops-manifest 리뷰로 발견).
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
